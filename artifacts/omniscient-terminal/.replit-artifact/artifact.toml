kind = "web"
previewPath = "/"
title = "Omniscient Terminal"
version = "1.0.0"
id = "artifacts/omniscient-terminal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20830

[services.development]
run = "pnpm --filter @workspace/omniscient-terminal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omniscient-terminal", "run", "build" ]
publicDir = "artifacts/omniscient-terminal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20830"
BASE_PATH = "/"
